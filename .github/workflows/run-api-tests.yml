# Имя нашего пайплайна, которое будет отображаться в GitHub
name: Run API Tests

# Триггер: Запускать этот пайплайн при каждом 'push' (загрузке кода)
# в ветку 'main'.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Задачи (Jobs), которые нужно выполнить.
jobs:
  # Название задачи. Может быть любым.
  test:
    # Указываем, на какой операционной системе будет работать наш "робот".
    # ubuntu-latest — это стандартный, быстрый и бесплатный вариант.
    runs-on: ubuntu-latest

    # Шаги (Steps), которые нужно выполнить последовательно.
    steps:
      # Шаг 1: Клонирование репозитория
      # Этот экшен 'actions/checkout' скачивает твой код на виртуальную машину.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Установка Python
      # Этот экшен 'actions/setup-python' устанавливает нужную нам версию Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Можно указать любую современную версию

      # Шаг 3: Установка зависимостей
      # 'run' позволяет выполнять любые команды в терминале виртуальной машины.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Шаг 4: Запуск тестов
      # Главный шаг! Запускаем pytest.
      - name: Run Pytest
        run: pytest -v

